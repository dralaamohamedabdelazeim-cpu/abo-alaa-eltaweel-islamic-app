name: Build Islamic App APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Script
        run: bash script.sh
      - name: Build APK
        run: |
          cd MohamedAbdelazimApp
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mohamed-Abdelazim-App
          path: MohamedAbdelazimApp/app/build/outputs/apk/debug/app-debug.apk
