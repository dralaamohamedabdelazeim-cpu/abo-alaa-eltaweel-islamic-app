name: Build Islamic App APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Construct Project Automatically
      run: |
        # إنشاء المجلدات بدون تدخل بشري
        mkdir -p app/src/main/java/com/abdelazim/islamicapp
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/values
        
        # كتابة ملف النصوص مباشرة في جيت هب
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">تطبيق محمد عبد العظيم الطويل</string></resources>' > app/src/main/res/values/strings.xml
        
        # كتابة واجهة التطبيق
        cat <<EOF > app/src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:background="@drawable/father_background">
            <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                android:text="صدقة جارية: محمد عبد العظيم الطويل" android:layout_centerInParent="true" 
                android:textColor="#FFFFFF" android:textSize="22sp" android:textStyle="bold"/>
        </RelativeLayout>
        EOF

        # كتابة كود الجافا
        cat <<EOF > app/src/main/java/com/abdelazim/islamicapp/MainActivity.java
        package com.abdelazim.islamicapp;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
            }
        }
        EOF

    - name: Build APK with Auto-Gradle
      run: |
        # تنظيف وبناء المشروع
        sudo apt-get install -y gradle
        gradle assembleDebug || echo "Retry build..."
        
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Mohamed-Abdelazim-App
        path: "**/build/outputs/apk/debug/*.apk"
